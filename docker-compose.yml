version: "3.9"

services:
  fastapi:
    build: .
    container_name: aira-fastapi
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SEARXNG_URL: ${SEARXNG_URL:-http://searxng:8080}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://192.168.253.29:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      SEARXNG_TIMEOUT: ${SEARXNG_TIMEOUT:-30}
      HF_TOKEN: ${HF_TOKEN:-}
    depends_on:
      - searxng

  ngrok:
    image: ngrok/ngrok:latest
    container_name: aira-ngrok
    restart: unless-stopped
    env_file:
      - .env
    command: "http fastapi:8000 --url=perkingly-gawkiest-irina.ngrok-free.dev --log=stdout"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    depends_on:
      - fastapi

  searxng:
    image: searxng/searxng:latest
    container_name: aira-searxng
    restart: unless-stopped
    ports:
      - "8888:8080"
    environment:
      SEARXNG_SETTINGS_PATH: /etc/searxng/settings.yml
    volumes:
      - ./searxng-settings:/etc/searxng

